name: Deploy to Cloud.ru Artifact Registry
 
on:
  push:
    branches:
      - main # Срабатывает при пуше в ветку main
 
jobs:
  build-and-push:
    name: Build & Push to Cloud.ru Artifact Registry
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Install dependencies
        run: npm install
 
      - name: Build the application
        run: npm run build
 
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to Cloud.ru Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: dom-ru.cr.cloud.ru
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
 
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: dom-ru.cr.cloud.ru/domru-yandex-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
