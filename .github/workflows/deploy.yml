name: Deploy to Cloud.ru VPS

on:
  push:
    branches:
      - main # Срабатывает при пуше в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '18.x'
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the application
        run: npm run build

      - name: Copy built files and configs via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_PASSPHRASE }} # Если SSH-ключ запаролен (опционально)
          source: "dist/,package.json,package-lock.json,Dockerfile"
          target: "~/domru-yandex-bridge" # Путь к папке проекта на VPS

      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_PASSPHRASE }}
          script: |
            cd ~/domru-yandex-bridge
            
            echo "1. Сборка нового Docker-образа..."
            docker build -t domru-bridge-img .
            
            echo "2. Остановка и удаление старого контейнера (если он запущен)..."
            docker stop domru-bridge || true
            docker rm domru-bridge || true
            
            echo "3. Запуск контейнера на свободном порту 3100..."
            # Мы пробрасываем порт 3100 хоста во внутренний порт 3000 контейнера
            docker run -d \
              --name domru-bridge \
              --restart always \
              -p 3100:3000 \
              domru-bridge-img
            
            echo "4. Очистка неиспользуемых старых Docker образов..."
            docker image prune -f
            
            echo "Готово! Проект успешно перезапущен в Docker на порту 3100"
