name: Deploy to Cloud.ru VPS via Artifact Registry

on:
  push:
    branches:
      - main # Срабатывает при пуше в ветку main

jobs:
  build-and-push:
    name: Build & Push to Cloud.ru Artifact Registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build the application
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Cloud.ru Artifact Registry
        uses: docker/login-action@v3
        with:
          # Адрес вашего реестра Cloud.ru (например, cr.ru-central1.aerid.co).
          # Если у вас используется другой хост, измените его в секрете CR_REGISTRY.
          registry: ${{ secrets.CR_REGISTRY }}
          username: ${{ secrets.CR_USERNAME }}
          password: ${{ secrets.CR_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Тэг образа. По умолчанию используем имя репозитория и тэг latest
          tags: ${{ secrets.CR_REGISTRY }}/domru-yandex-bridge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Pull & Deploy on VPS via SSH
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_PASSPHRASE }} # Опционально, если ваш SSH-ключ запаролен
          script: |
            echo "1. Авторизация на VPS в Cloud.ru Artifact Registry..."
            echo "${{ secrets.CR_PASSWORD }}" | docker login ${{ secrets.CR_REGISTRY }} -u "${{ secrets.CR_USERNAME }}" --password-stdin
            
            echo "2. Загрузка последнего образа из реестра..."
            docker pull ${{ secrets.CR_REGISTRY }}/domru-yandex-bridge:latest
            
            echo "3. Остановка старого контейнера (если он запущен)..."
            docker stop domru-bridge || true
            docker rm domru-bridge || true
            
            echo "4. Запуск нового контейнера на свободном порту 3100..."
            # На стороне VPS пробрасываем внешний свободный порт 3100 на внутренний 3000 контейнера
            docker run -d \
              --name domru-bridge \
              --restart always \
              -p 3100:3000 \
              ${{ secrets.CR_REGISTRY }}/domru-yandex-bridge:latest
            
            echo "5. Очистка устаревших Docker образов на сервере..."
            docker image prune -f
            
            echo "Проект успешно обновлен и запущен на порту 3100!"

